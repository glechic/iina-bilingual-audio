<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html { margin: 0; padding: 0; }
    body {
      padding: 16px;
      margin: 0;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1f2023;
      background: none;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #dadada; }
    }
    p { margin: 0; }
    small, .small { font-size: 11px; }
    .secondary { color: rgba(127, 127, 127, 1); }
    .pref-section { margin-bottom: 12px; }
    .pref-help { margin-top: 2px; }
  </style>
</head>
<body>
  <div class="pref-section">
    <label>
      <input type="checkbox" data-type="bool" data-pref-key="auto_show" />
      Auto-show sidebar for files with multiple audio tracks
    </label>
    <p class="small secondary pref-help">
      When enabled, the Bilingual Audio sidebar will automatically appear when you open a video with 2+ audio tracks.
    </p>
  </div>
</body>
</html>
