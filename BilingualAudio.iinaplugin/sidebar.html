<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; }
    html { margin: 0; padding: 0; }
    body {
      padding: 16px;
      margin: 0;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    p { margin: 0; }
    small, .small { font-size: 11px; }
    .secondary { color: rgba(0, 0, 0, 0.5); }
    .section { margin-bottom: 12px; }
    .disabled { opacity: 0.4; pointer-events: none; }
  </style>
</head>
<body>
  <div class="section">
    <label>
      <input type="checkbox" id="bilingualToggle" />
      Bilingual mode
    </label>
    <p class="small secondary">Send one audio track to the left channel and another to the right.</p>
  </div>

  <div class="section disabled" id="channelSection">
    <p>Left channel:</p>
    <select id="leftSelect" style="width: 100%; margin-top: 2px"></select>
    <p style="margin-top: 8px">Right channel:</p>
    <select id="rightSelect" style="width: 100%; margin-top: 2px"></select>
    <button type="button" id="swapBtn" style="width: 100%; margin-top: 8px; padding: 4px 8px;">Swap left/right</button>
    <p style="margin-top: 12px;">Left volume: <span id="vol1Label">100%</span></p>
    <input type="range" id="vol1Slider" min="0" max="100" value="100" style="width: 100%; margin-top: 2px;">
    <p style="margin-top: 8px;">Right volume: <span id="vol2Label">100%</span></p>
    <input type="range" id="vol2Slider" min="0" max="100" value="100" style="width: 100%; margin-top: 2px;">
  </div>

  <script>
    let tracks = [];
    let suppressApply = false;

    function populateTracks(list) {
      tracks = list || [];
      const l = document.getElementById('leftSelect');
      const r = document.getElementById('rightSelect');
      l.innerHTML = '';
      r.innerHTML = '';
      if (tracks.length === 0) return;
      tracks.forEach((t, i) => {
        const id = t.id !== undefined ? t.id : (i + 1);
        const title = t.title || t.lang || ('Track ' + id);
        const text = 'Track ' + id + ': ' + title;
        l.add(new Option(text, id));
        r.add(new Option(text, id));
      });
      if (tracks.length >= 1) l.value = tracks[0].id || 1;
      if (tracks.length > 1) r.value = tracks[1].id || 2;
    }

    function apply() {
      if (suppressApply) return;
      const on = document.getElementById('bilingualToggle').checked;
      const t1 = document.getElementById('leftSelect').value;
      const t2 = document.getElementById('rightSelect').value;
      const vol1 = parseInt(document.getElementById('vol1Slider').value) / 100;
      const vol2 = parseInt(document.getElementById('vol2Slider').value) / 100;
      document.getElementById('channelSection').classList.toggle('disabled', !on);
      if (iina && iina.postMessage) {
        iina.postMessage('apply-mix', {
          enabled: on,
          track1Id: parseInt(t1),
          track2Id: parseInt(t2),
          vol1: vol1,
          vol2: vol2
        });
      }
    }

    function restoreSelection(state) {
      suppressApply = true;
      if (state.leftId !== undefined && state.rightId !== undefined) {
        document.getElementById('leftSelect').value = state.leftId;
        document.getElementById('rightSelect').value = state.rightId;
      }
      document.getElementById('bilingualToggle').checked = !!state.enabled;
      const v1 = state.vol1 !== undefined ? state.vol1 : 1;
      const v2 = state.vol2 !== undefined ? state.vol2 : 1;
      document.getElementById('vol1Slider').value = Math.round(v1 * 100);
      document.getElementById('vol2Slider').value = Math.round(v2 * 100);
      document.getElementById('vol1Label').textContent = Math.round(v1 * 100) + '%';
      document.getElementById('vol2Label').textContent = Math.round(v2 * 100) + '%';
      document.getElementById('channelSection').classList.toggle('disabled', !state.enabled);
      suppressApply = false;
    }

    document.getElementById('bilingualToggle').addEventListener('change', apply);
    document.getElementById('leftSelect').addEventListener('change', apply);
    document.getElementById('rightSelect').addEventListener('change', apply);

    document.getElementById('swapBtn').addEventListener('click', () => {
      const l = document.getElementById('leftSelect');
      const r = document.getElementById('rightSelect');
      const tmp = l.value;
      l.value = r.value;
      r.value = tmp;
      apply();
    });

    document.getElementById('vol1Slider').addEventListener('input', (e) => {
      document.getElementById('vol1Label').textContent = e.target.value + '%';
    });
    document.getElementById('vol1Slider').addEventListener('change', apply);
    document.getElementById('vol2Slider').addEventListener('input', (e) => {
      document.getElementById('vol2Label').textContent = e.target.value + '%';
    });
    document.getElementById('vol2Slider').addEventListener('change', apply);

    if (iina && iina.onMessage) {
      iina.onMessage('tracks-loaded', (data) => populateTracks(data.tracks));
      iina.onMessage('selection-restored', (data) => restoreSelection(data));
    }
  </script>
</body>
</html>
